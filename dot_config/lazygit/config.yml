# lazygit — managed by chezmoi (dot_config/lazygit/config.yml → ~/.config/lazygit/config.yml).
# XDG_CONFIG_HOME is set, so lazygit reads this path (not ~/Library/Application Support).
#
# Route lazygit's diffs through delta (unified — lazygit's panel is narrow; --paging=never
# because lazygit does its own scrolling). Picks up [delta] settings from ~/.config/git/config.
#
# NOTE: lazygit 0.63+ uses `git.pagers` (a list). The older `git.paging` map gets
# auto-migrated on start, which would fight chezmoi on every apply — so use `pagers` here.
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
