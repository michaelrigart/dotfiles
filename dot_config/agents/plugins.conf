# AI agent marketplaces + plugins, reconciled by .scripts/reconcile-agents.sh.
#
# Format: <kind>  <value>   (# comments and blank lines ignored)
# Kinds:  claude_marketplace | claude_plugin | codex_marketplace | codex_plugin
#
# claude-plugins-official is Claude Code's built-in default marketplace — deliberately
# NOT declared here; the *-official plugins below resolve against it.

claude_marketplace  basecamp/claude-plugins

claude_plugin       basecamp@37signals
claude_plugin       claude-code-setup@claude-plugins-official
claude_plugin       claude-md-management@claude-plugins-official
claude_plugin       code-review@claude-plugins-official
claude_plugin       frontend-design@claude-plugins-official
claude_plugin       pr-review-toolkit@claude-plugins-official
claude_plugin       ruby-lsp@claude-plugins-official
claude_plugin       superpowers@claude-plugins-official

codex_marketplace   addyosmani/agent-skills

codex_plugin        agent-skills@agent-skills
