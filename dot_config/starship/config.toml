# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 700

[gcloud]
disabled = true

[username]
show_always = true
style_user = "#719cd6"
style_root = "#c94f6d"
format = " [╭─ $user]($style)"

[hostname]
ssh_only = false
format = "[$ssh_symbol](bold blue)@[$hostname](bold #84cee4) "

[character]
error_symbol = " [╰─ λ](bold #c94f6d)"
success_symbol = " [╰─ λ](bold #719cd6)"

[directory]
truncation_symbol = "…/"

